spring:
  application:
    name: cimaise-server

  # JPA + PostgreSQL configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cimaise}
    username: ${DB_USER:cimaise}
    password: ${DB_PASSWORD:cimaise}

  jpa:
    # Hibernate crée/met à jour les tables automatiquement au démarrage
    # "update" = crée les tables manquantes, ajoute les colonnes manquantes, ne supprime rien
    # En production on utiliserait Flyway ou Liquibase pour des migrations versionnées
    hibernate:
      ddl-auto: update
    # Affiche les requêtes SQL dans les logs (utile en dev, à désactiver en prod)
    show-sql: true

server:
  port: 8080

# Actuator: expose /actuator/health pour vérifier que le serveur tourne
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger UI disponible sur /swagger-ui/index.html
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

# Chemin vers le dossier partagé (NAS simulé)
cimaise:
  shared-path: ${SHARED_PATH:/data/shared}
