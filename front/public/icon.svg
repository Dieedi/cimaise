<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#352A8C"/>
      <stop offset="100%" style="stop-color:#5B21B6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Rail (cimaise) — horizontal bar near the top -->
  <rect x="60" y="120" width="392" height="16" rx="8" fill="#ffffff"/>

  <!-- Hook 1 — vertical wire + small hook arc -->
  <line x1="160" y1="136" x2="160" y2="190" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <path d="M 160 190 Q 160 205 148 205" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Frame 1 — large, slightly tilted -->
  <g transform="rotate(-3, 148, 300)">
    <rect x="88" y="210" width="140" height="180" rx="6" fill="none" stroke="#ffffff" stroke-width="8"/>
    <!-- Inner mat -->
    <rect x="104" y="226" width="108" height="148" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Hook 2 -->
  <line x1="350" y1="136" x2="350" y2="175" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <path d="M 350 175 Q 350 190 338 190" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Frame 2 — smaller, slightly tilted the other way -->
  <g transform="rotate(2, 338, 290)">
    <rect x="278" y="195" width="120" height="150" rx="6" fill="none" stroke="#ffffff" stroke-width="8"/>
    <!-- Inner mat -->
    <rect x="292" y="209" width="92" height="122" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Small decorative frame 3 — bottom right, no hook (leaning against wall) -->
  <g transform="rotate(5, 380, 420)">
    <rect x="320" y="380" width="80" height="90" rx="4" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.6"/>
  </g>
</svg>
